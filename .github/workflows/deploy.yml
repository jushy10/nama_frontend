name: Build, push, and deploy to ECS

# Builds the Docker image, pushes it to Amazon ECR, then triggers a rolling
# deployment of the existing ECS service so it pulls the new image.
#
# The ECS task definition, service, cluster, roles, and ALB are managed by
# Terraform (in the backend repo) — this workflow does NOT manage them. The
# task definition must reference the moving tag this pushes (e.g. ":latest"),
# so a forced deployment re-pulls the updated image without registering a new
# task definition revision (no Terraform drift).
#
# Runs on every push to main (and via manual "Run workflow"). Authenticates
# with GitHub OIDC — no long-lived AWS keys are stored.
#
# Required setup (see the README "CI/CD" section for details):
#   - The Terraform-managed IAM role (AWS_ROLE_ARN secret) must allow ECR push
#     plus ecs:UpdateService and ecs:DescribeServices.
#   - Set the env values below to match your AWS resources.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: nama-frontend
  ECS_CLUSTER: nama-cluster
  ECS_SERVICE: nama-frontend

# Don't cancel an in-flight deploy; let it finish.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write # required to request the OIDC token for AWS auth
  contents: read

jobs:
  deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          # ":latest" is the moving tag the Terraform task definition references;
          # ":<sha>" is an immutable tag for traceability / rollback.
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Force a new ECS deployment
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --query 'service.{name:serviceName,taskDef:taskDefinition,desired:desiredCount}' \
            --output table

      - name: Wait for the service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"
