name: Build & Deploy Frontend
run-name: Build & deploy frontend · ${{ github.ref_name }}

# PRs           -> build only (validate the bundle compiles).
# Merge to main -> build, sync the bundle to S3, invalidate CloudFront.
#
# The S3 bucket + CloudFront distribution are created by the backend repo's
# Terraform (module "frontend" -> static-site-cloudfront). They're resolved at
# deploy time by bucket-name prefix and CloudFront alias, so nothing here breaks
# if the infra is destroyed and recreated with a new bucket suffix / distribution.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  # Vite inlines VITE_* at BUILD time, so the API URL is set before `npm run build`.
  VITE_API_URL: https://api.namainsights.com
  # PostHog product analytics. The project key is a *publishable* client-side key
  # (it ships in the bundle), so it's a repo Actions **variable**, not a secret —
  # set it and analytics turns on; leave it unset and the build simply ships with
  # analytics off. Host defaults to PostHog US cloud.
  VITE_PUBLIC_POSTHOG_KEY: ${{ vars.VITE_PUBLIC_POSTHOG_KEY }}
  VITE_PUBLIC_POSTHOG_HOST: ${{ vars.VITE_PUBLIC_POSTHOG_HOST || 'https://us.i.posthog.com' }}

jobs:
  # On pull requests: just prove the bundle builds. No AWS credentials, no upload.
  validate:
    name: Validate build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build

  # On merge to main (or a manual run): build and publish.
  deploy:
    name: Build & deploy
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Find the bucket (name starts with "nama-frontend-dev-") and the
      # distribution (serves the apex domain) instead of hardcoding ids.
      - name: Resolve S3 bucket + CloudFront distribution
        id: target
        run: |
          set -euo pipefail
          bucket=$(aws s3api list-buckets \
            --query "Buckets[?starts_with(Name, 'nama-frontend-dev-')].Name | [0]" \
            --output text)
          dist=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(Aliases.Items, 'namainsights.com')].Id | [0]" \
            --output text)
          if [ -z "$bucket" ] || [ "$bucket" = "None" ]; then
            echo "::error::No bucket matching nama-frontend-dev-* — has the infra been applied?"; exit 1
          fi
          if [ -z "$dist" ] || [ "$dist" = "None" ]; then
            echo "::error::No CloudFront distribution for namainsights.com — has the infra been applied?"; exit 1
          fi
          echo "bucket=$bucket" >> "$GITHUB_OUTPUT"
          echo "distribution=$dist" >> "$GITHUB_OUTPUT"
          echo "Resolved bucket=$bucket distribution=$dist"

      - name: Upload bundle to S3
        env:
          BUCKET: ${{ steps.target.outputs.bucket }}
        run: |
          set -euo pipefail
          # Hashed, fingerprinted assets are immutable — cache them hard. Everything
          # except index.html (which references this build's hashed filenames).
          aws s3 sync dist "s3://$BUCKET" --delete \
            --cache-control 'public,max-age=31536000,immutable' \
            --exclude index.html
          # index.html must never be cached, so a new deploy is picked up at once.
          aws s3 cp dist/index.html "s3://$BUCKET/index.html" \
            --cache-control 'no-cache'

      - name: Invalidate CloudFront
        env:
          DIST: ${{ steps.target.outputs.distribution }}
        run: aws cloudfront create-invalidation --distribution-id "$DIST" --paths '/*'
