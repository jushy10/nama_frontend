# nginx server block for serving the Vite SPA.
# Copied to /etc/nginx/conf.d/default.conf in the Docker image.
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compress text-based responses.
    gzip              on;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_vary         on;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # Lightweight health endpoint for ECS / ALB target group checks.
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }

    # Hashed build assets are immutable — cache them aggressively.
    location /assets/ {
        expires    1y;
        add_header  Cache-Control "public, immutable";
        try_files   $uri =404;
    }

    # SPA fallback: send any unmatched path to index.html so client-side
    # routing (React Router) works on direct navigation / refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
